<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1c3d72">
    <title>企业财务情况分析 - 绥芬河市工业信息科技局服务平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gov-red: #c8102e;
            --gov-red-dark: #a00c24;
            --gov-blue: #1c3d72;
            --gov-blue-dark: #122850;
            --text-1: #1a1a1a;
            --text-2: #4a4a4a;
            --text-3: #7a7a7a;
            --line: #e6e6e6;
            --bg: #f4f6f9;
            --card: #ffffff;
            --green: #2ea043;
        }
        html, body {
            font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "Source Han Sans CN", sans-serif;
            background: var(--bg);
            color: var(--text-1);
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        a { color: inherit; text-decoration: none; }

        /* 顶部条：极简 */
        .topbar {
            background: var(--gov-red);
            color: #fff;
            padding: 6px 0;
            font-size: 12px;
        }
        .topbar-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar a {
            color: #fff;
            opacity: 0.95;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .topbar a:hover { opacity: 1; }

        /* 头部：首屏重要 */
        .header {
            background: #fff;
            border-bottom: 4px solid var(--gov-blue);
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 18px 24px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-icon {
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--gov-blue) 0%, var(--gov-blue-dark) 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-icon svg { width: 32px; height: 32px; fill: #fff; }
        .header-text { flex: 1; min-width: 0; }
        .header-text h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-1);
            line-height: 1.2;
            margin-bottom: 4px;
        }
        .header-text .sub {
            color: var(--text-3);
            font-size: 13px;
            line-height: 1.4;
        }
        .header-back {
            flex-shrink: 0;
            padding: 8px 14px;
            border: 1px solid var(--line);
            border-radius: 4px;
            font-size: 13px;
            color: var(--text-2);
            transition: all .2s;
        }
        .header-back:hover {
            border-color: var(--gov-blue);
            color: var(--gov-blue);
        }

        main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        /* 引导条：公众号使用提示 */
        .guide {
            background: #fff8e6;
            border-left: 4px solid #f59e0b;
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #92400e;
        }
        .guide svg { width: 18px; height: 18px; flex-shrink: 0; fill: #f59e0b; }

        /* 卡片网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }
        .card {
            background: #fff;
            border: 1px solid var(--line);
            border-left: 4px solid var(--gov-blue);
            border-radius: 6px;
            padding: 20px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all .2s;
            cursor: pointer;
        }
        .card:hover {
            border-color: var(--gov-blue);
            border-left-color: var(--gov-red);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(28,61,114,0.12);
        }
        .card-icon {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--gov-blue) 0%, var(--gov-blue-dark) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s;
        }
        .card:hover .card-icon {
            background: linear-gradient(135deg, var(--gov-red) 0%, var(--gov-red-dark) 100%);
        }
        .card-icon svg { width: 26px; height: 26px; fill: #fff; }
        .card-body { flex: 1; min-width: 0; }
        .card-body h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .card-body p {
            font-size: 12px;
            color: var(--text-3);
            line-height: 1.4;
        }
        .card-arrow {
            flex-shrink: 0;
            color: var(--text-3);
            font-size: 18px;
            transition: transform .2s, color .2s;
        }
        .card:hover .card-arrow {
            color: var(--gov-red);
            transform: translateX(4px);
        }

        /* 响应式：移动端优先 1 列 */
        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            .topbar-inner, .header-inner, main { padding-left: 16px; padding-right: 16px; }
            .header-text h1 { font-size: 19px; }
            .header-text .sub { font-size: 12px; }
            .header-icon { width: 44px; height: 44px; }
            .header-icon svg { width: 24px; height: 24px; }
            .header-back { padding: 6px 10px; font-size: 12px; }
            .grid { grid-template-columns: 1fr; gap: 10px; }
            .card { padding: 14px; gap: 12px; }
            .card-icon { width: 42px; height: 42px; }
            .card-icon svg { width: 22px; height: 22px; }
            .card-body h3 { font-size: 14px; }
            .card-body p { font-size: 11px; }
            .guide { font-size: 12px; padding: 10px 12px; }
        }
        @media (max-width: 360px) {
            .header-text h1 { font-size: 17px; }
            .card-body h3 { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-inner">
        <span id="topbar-date">--</span>
        <a href="/">返回首页 →</a>
    </div>
</div>

<header class="header">
    <div class="header-inner">
        <div class="header-icon">
            <svg viewBox="0 0 24 24"><path d="M3 3h2v18H3V3zm4 0h2v18H7V3zm4 0h2v18h-2V3zm4 0h6a2 2 0 012 2v3h-2V5h-6v14h6v-3h2v3a2 2 0 01-2 2h-6V3z"/><circle cx="6" cy="8" r="1"/><circle cx="6" cy="16" r="1"/><circle cx="14" cy="8" r="1"/><circle cx="14" cy="16" r="1"/></svg>
        </div>
        <div class="header-text">
            <h1>企业财务情况分析</h1>
            <div class="sub">多维度智能分析企业经营状况，助力精准决策</div>
        </div>
        <a href="/" class="header-back">← 首页</a>
    </div>
</header>

<main>
    <div class="guide">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        <span>请选择需要分析的项目，点击对应卡片即可开始在线评估</span>
    </div>

    <div class="grid">
        <a class="card" href="/111/debt_analysis.html">
            <div class="card-icon">
                <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            </div>
            <div class="card-body">
                <h3>偿债能力分析</h3>
                <p>短期与长期偿债风险评估</p>
            </div>
            <div class="card-arrow">›</div>
        </a>

        <a class="card" href="/222/financial_analysis.html">
            <div class="card-icon">
                <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6h-6z"/></svg>
            </div>
            <div class="card-body">
                <h3>营运能力分析</h3>
                <p>资产周转效率与运营效率</p>
            </div>
            <div class="card-arrow">›</div>
        </a>

        <a class="card" href="/333/profitability_analysis.html">
            <div class="card-icon">
                <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
            </div>
            <div class="card-body">
                <h3>盈利能力分析</h3>
                <p>利润率与盈利水平评估</p>
            </div>
            <div class="card-arrow">›</div>
        </a>

        <a class="card" href="/444/profitability_analysis.html">
            <div class="card-icon">
                <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
            </div>
            <div class="card-body">
                <h3>盈利质量分析</h3>
                <p>利润含金量与现金流匹配</p>
            </div>
            <div class="card-arrow">›</div>
        </a>

        <a class="card" href="/555/finance_growth_analysis.html">
            <div class="card-icon">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.11 0 2-.9 2-2V5c0-1.1-.89-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
            </div>
            <div class="card-body">
                <h3>发展能力分析</h3>
                <p>营收与资产增长趋势</p>
            </div>
            <div class="card-arrow">›</div>
        </a>
    </div>
</main>

<script src="assets/site-footer.js"></script>
<script>
    // 实时日期
    (function () {
        var d = new Date();
        var w = ['日','一','二','三','四','五','六'][d.getDay()];
        var p = function (x) { return x < 10 ? '0' + x : x; };
        document.getElementById('topbar-date').textContent =
            d.getFullYear() + '年' + p(d.getMonth() + 1) + '月' + p(d.getDate()) + '日　星期' + w;
    })();
</script>
</body>
</html>
